name: Desktop CLI Cross Platform

on:
  pull_request:
    paths:
      - '.github/workflows/desktop-cli-cross-platform.yml'
      - 'apps/desktop/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/desktop-cli-cross-platform.yml'
      - 'apps/desktop/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

concurrency:
  group: desktop-cli-cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-smoke:
    name: CLI Smoke (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            runs_on: macos-latest
            package_command: pnpm run desktop:package:mac:arm64
          - label: Linux
            runs_on: ubuntu-latest
            package_command: pnpm run desktop:package:linux
          - label: Windows
            runs_on: windows-latest
            package_command: pnpm run desktop:package:win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize package submodules
        shell: bash
        run: |
          git config submodule.packages/electron-trpc.url https://github.com/bitsentry-ai/electron-trpc.git
          git config submodule.packages/plugin-sdk.url https://github.com/bitsentry-ai/-bitsentry-plugin-sdk.git
          git config submodule.packages/plugins/github.url https://github.com/bitsentry-ai/bitsentry-plugin-github.git
          git config submodule.packages/plugins/posthog.url https://github.com/bitsentry-ai/bitsentry-plugin-posthog.git
          git config submodule.packages/plugins/sentry.url https://github.com/bitsentry-ai/bitsentry-plugin-sentry.git
          git config submodule.packages/plugins/wazuh.url https://github.com/bitsentry-ai/bitsentry-plugin-wazuh.git
          git submodule update --init --depth 1 \
            packages/electron-trpc \
            packages/plugin-sdk \
            packages/plugins/github \
            packages/plugins/posthog \
            packages/plugins/sentry \
            packages/plugins/wazuh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg \
            fakeroot \
            rpm \
            libgtk-3-0 \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libgbm1 \
            libatk-bridge2.0-0 \
            xvfb

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Install electron-trpc dependencies
        shell: bash
        run: pnpm --dir packages/electron-trpc install --frozen-lockfile

      - name: Ensure Electron binary is installed
        shell: bash
        run: pnpm --dir apps/desktop exec node node_modules/electron/install.js

      - name: Install desktop native dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pnpm --dir apps/desktop run prepare:native-deps -- --arch=x64
          else
            pnpm --dir apps/desktop run prepare:native-deps
          fi

      - name: Rebuild pending native dependencies
        shell: bash
        run: |
          pnpm rebuild --pending
          pnpm --dir packages/electron-trpc rebuild --pending

      - name: Build shared packages
        shell: bash
        run: pnpm run build:packages

      - name: Run desktop CLI smoke test
        shell: bash
        run: pnpm run desktop:test:cli

      - name: Run desktop CLI stress test
        shell: bash
        run: pnpm run desktop:test:cli:stress

      - name: Package desktop app for CLI wrapper smoke
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DESKTOP_SKIP_SIGNATURE_CHECK: 'true'
        run: ${{ matrix.package_command }}

      - name: Run packaged desktop CLI smoke test
        shell: bash
        run: pnpm run desktop:test:cli:packaged

      - name: Run packaged desktop CLI stress test
        shell: bash
        run: pnpm run desktop:test:cli:packaged:stress

      - name: Run packaged no-op runbook smoke test
        shell: bash
        env:
          BITSENTRY_DESKTOP_SMOKE_BINARY: ${{ runner.os == 'macOS' && 'release/build/mac-arm64/SuperTerminal.app/Contents/MacOS/SuperTerminal' || runner.os == 'Windows' && 'release/build/win-unpacked/SuperTerminal.exe' || 'release/build/linux-unpacked/SuperTerminal' }}
          BITSENTRY_DESKTOP_SMOKE_NO_SANDBOX: ${{ runner.os == 'Linux' && '1' || '' }}
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a pnpm --dir apps/desktop run test:smoke:runbook:packaged
          else
            pnpm --dir apps/desktop run test:smoke:runbook:packaged
          fi
