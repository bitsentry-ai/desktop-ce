name: Desktop Quality

on:
  pull_request:
    paths:
      - '.github/workflows/desktop-quality.yml'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deterministic-desktop:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Initialize package submodules
        run: |
          git config submodule.packages/electron-trpc.url https://github.com/bitsentry-ai/electron-trpc.git
          git config submodule.packages/plugin-sdk.url https://github.com/bitsentry-ai/-bitsentry-plugin-sdk.git
          git config submodule.packages/plugins/github.url https://github.com/bitsentry-ai/bitsentry-plugin-github.git
          git config submodule.packages/plugins/posthog.url https://github.com/bitsentry-ai/bitsentry-plugin-posthog.git
          git config submodule.packages/plugins/sentry.url https://github.com/bitsentry-ai/bitsentry-plugin-sentry.git
          git config submodule.packages/plugins/wazuh.url https://github.com/bitsentry-ai/bitsentry-plugin-wazuh.git
          git submodule update --init --depth 1 \
            packages/electron-trpc \
            packages/plugin-sdk \
            packages/plugins/github \
            packages/plugins/posthog \
            packages/plugins/sentry \
            packages/plugins/wazuh
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - name: Install desktop runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libgbm1 \
            libatk-bridge2.0-0
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir packages/electron-trpc install --frozen-lockfile
      - run: pnpm --dir apps/desktop exec node node_modules/electron/install.js
      - run: pnpm --filter @bitsentry-ce/desktop test
      # Vitest executes under Node, whereas Electron needs a separately rebuilt
      # native module ABI. Rebuild only after deterministic Node tests finish.
      - run: pnpm --dir apps/desktop run prepare:native-deps
      - run: pnpm run build
      - name: Run local runbook smoke scenario
        env:
          BITSENTRY_DESKTOP_SMOKE_NO_SANDBOX: '1'
        run: xvfb-run -a pnpm run desktop:test:smoke:runbook
