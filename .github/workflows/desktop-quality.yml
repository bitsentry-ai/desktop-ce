name: Desktop Quality

on:
  pull_request:
    paths:
      - '.github/workflows/desktop-quality.yml'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deterministic-desktop:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bitsentry-ce/desktop test
      - run: pnpm run build
      - name: Run local runbook smoke scenario
        run: xvfb-run -a pnpm run desktop:test:smoke:runbook
