name: i18n check

on:
  pull_request:
    paths:
      - '.github/workflows/i18n-check.yml'
      - 'apps/desktop/src/renderer/src/**'
      - 'packages/components/src/**'
      - 'packages/i18n/**'
      - 'scripts/i18n/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/i18n-check.yml'
      - 'apps/desktop/src/renderer/src/**'
      - 'packages/components/src/**'
      - 'packages/i18n/**'
      - 'scripts/i18n/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

concurrency:
  group: i18n-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  i18n-check:
    name: Locale integrity and hardcoded UI audit
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Locale integrity
        run: pnpm run i18n:audit:integrity

      - name: Hardcoded UI string audit
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: pnpm run i18n:audit:hardcoded
